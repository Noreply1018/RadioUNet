experiment:
  name: s_irt2_thr2_rand1_300
  description: RadioUNet_S clean-map IRT2 with random 1..300 input samples.
  seed: 42
data:
  dataset_dir: RadioMapSeer/
  loader: RadioUNet_s
  simulation: IRT2
  city_map: complete
  cars_simulation: 'no'
  cars_input: 'no'
  num_tx: 80
  threshold: 0.2
  batch_size: 15
  num_workers: 1
  smoke_num_tx: 2
  target_scale: 256
  fix_samples: 0
  num_samples_low: 1
  num_samples_high: 301
model:
  class_name: RadioWNet
  inputs: 3
  phases:
  - firstU
  - secondU
training:
  epochs: 50
  optimizer: Adam
  learning_rate: 0.0001
  scheduler: StepLR
  step_size: 30
  gamma: 0.1
  loss: MSELoss
evaluation:
  metrics:
  - mse
  - nmse
  - rmse
  save_prediction_panels: true
  measure_runtime: true
