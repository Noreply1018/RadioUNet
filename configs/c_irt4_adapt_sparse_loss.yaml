experiment:
  name: c_irt4_adapt_sparse_loss
  description: "Stage 3C RadioUNet_C IRT4 sparse adaptation baseline: 300 sparse receivers per map and sparse loss on the returned IRT4 measurement mask."
  seed: 42

data:
  dataset_dir: RadioMapSeer/
  loader: RadioUNet_c_sprseIRT4
  simulation: IRT4
  city_map: complete
  cars_simulation: no
  cars_input: no
  num_tx: 2
  threshold: 0.2
  batch_size: 15
  num_workers: 1
  smoke_num_tx: 2
  num_samples: 300

model:
  class_name: RadioWNet
  inputs: 2
  phases:
    - secondU

training:
  adaptation_mode: secondU-only
  init_checkpoint: reports/c_dpm_thr2/20260506_182311/checkpoints/firstU.pt
  epochs: 50
  optimizer: Adam
  learning_rate: 0.0001
  scheduler: StepLR
  step_size: 30
  gamma: 0.1
  loss: MSELoss
  loss_mode: sparse_mse
  num_samples_for_loss: 300

evaluation:
  transfer_mode: C sparse adaptation baseline
  source_checkpoint: reports/c_dpm_thr2/20260506_182311/checkpoints/firstU.pt
  source_training_target: DPM
  target: IRT4
  tx_note: IRT4 files are available only for Tx indices 0 and 1, so num_tx is fixed to 2 for train, val, and test.
  sparse_note: RadioUNet_C has no measurement input channel; sparse loss is computed on the 300 receiver mask returned by the IRT4 sparse loader.
  compare_against:
    - reports/irt4_zeroshot/c_baseline/secondU_test_metrics.json
    - reports/irt4_adapt/s_irt4_adapt_rand1_300_pool600_sparse_loss/secondU_test_metrics.json
  metrics:
    - dense_mse
    - dense_nmse
    - sparse_point_mse
    - sparse_point_nmse
  save_prediction_panels: true
  measure_runtime: true
