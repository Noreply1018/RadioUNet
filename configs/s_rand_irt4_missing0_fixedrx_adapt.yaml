experiment:
  name: s_rand_irt4_missing0_fixedrx_adapt
  description: RadioUNet_S random coarse simulation-source IRT4 missing0 sparse adaptation
    with fixed receiver mask.
  seed: 42
data:
  dataset_dir: RadioMapSeer/
  loader: RadioUNet_s_sprseIRT4
  simulation: IRT4
  city_map: complete
  cars_simulation: 'no'
  cars_input: 'no'
  num_tx: 2
  threshold: 0.2
  batch_size: 15
  num_workers: 1
  smoke_num_tx: 2
  receiver_seed_policy: fixed_map
  target_scale: 256
  data_samples: 600
  fix_samples: 0
  num_samples_low: 1
  num_samples_high: 301
model:
  class_name: RadioWNet
  inputs: 3
  phases:
  - secondU
training:
  epochs: 50
  optimizer: Adam
  learning_rate: 0.0001
  scheduler: StepLR
  step_size: 30
  gamma: 0.1
  loss: MSELoss
  adaptation_mode: secondU-only
  init_checkpoint: reports/full_matrix/s_rand_thr2_rand1_300_50ep/checkpoints/firstU.pt
  loss_mode: sparse_mse
  num_samples_for_loss: 600
evaluation:
  metrics:
  - mse
  - nmse
  - rmse
  save_prediction_panels: true
  measure_runtime: true
  source_checkpoint: reports/full_matrix/s_rand_thr2_rand1_300_50ep/checkpoints/firstU.pt
  source_training_target: random coarse simulation
  target: IRT4
  receiver_policy: paper-faithful fixed receiver mask
