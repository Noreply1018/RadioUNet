experiment:
  name: s_dpm_thr2
  description: RadioUNet_S sample-assisted DPM full run with threshold 0.2 and fix_samples=100.
  seed: 42

data:
  dataset_dir: RadioMapSeer/
  loader: RadioUNet_s
  simulation: DPM
  city_map: complete
  cars_simulation: no
  cars_input: no
  num_tx: 80
  threshold: 0.2
  batch_size: 15
  num_workers: 1
  smoke_num_tx: 2
  fix_samples: 100
  num_samples_low: 10
  num_samples_high: 300
  target_scale: 256

model:
  class_name: RadioWNet
  inputs: 3
  phases:
    - firstU
    - secondU

training:
  epochs: 50
  optimizer: Adam
  learning_rate: 0.0001
  scheduler: StepLR
  step_size: 30
  gamma: 0.1
  loss: MSELoss

evaluation:
  metrics:
    - mse
    - nmse
    - rmse
  save_prediction_panels: true
  measure_runtime: true
