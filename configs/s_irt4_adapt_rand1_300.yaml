experiment:
  name: s_irt4_adapt_rand1_300
  description: "Archived dense-loss pilot only: Stage 3B IRT4 secondU-only adaptation initialized from Stage 2 RadioUNet_S. This 300-pool run is not paper-faithful Stage 3C because training loss is dense full-map MSE, and current scripts/train.py intentionally refuses to rerun IRT4 sparse adaptation with loss_mode=dense_mse."
  seed: 42

archive:
  status: archived_dense_loss_pilot
  rerunnable_with_current_train_entrypoint: false
  reason: "Current scripts/train.py enforces sparse_mse for IRT4 sparse adaptation. This config is retained only to label and audit the historical dense-loss artifact."

data:
  dataset_dir: RadioMapSeer/
  loader: RadioUNet_s_sprseIRT4
  simulation: IRT4
  city_map: complete
  cars_simulation: no
  cars_input: no
  num_tx: 2
  threshold: 0.2
  batch_size: 15
  num_workers: 1
  smoke_num_tx: 2
  data_samples: 300
  fix_samples: 0
  num_samples_low: 1
  num_samples_high: 301
  target_scale: 256

model:
  class_name: RadioWNet
  inputs: 3
  phases:
    - secondU

training:
  adaptation_mode: secondU-only
  init_checkpoint: reports/s_dpm_thr2/rand1_300_50ep/checkpoints/firstU.pt
  epochs: 50
  optimizer: Adam
  learning_rate: 0.0001
  scheduler: StepLR
  step_size: 30
  gamma: 0.1
  loss: MSELoss
  loss_mode: dense_mse

evaluation:
  transfer_mode: dense-loss pilot / 300-pool ablation
  source_checkpoint: reports/s_dpm_thr2/rand1_300_50ep/checkpoints/firstU.pt
  source_training_target: DPM
  target: IRT4
  tx_note: IRT4 files are available only for Tx indices 0 and 1, so num_tx is fixed to 2 for train, val, and test.
  sparse_note: Input samples are drawn only from the deterministic 300-point sparse IRT4 sample set for each map, but training loss for the saved pilot was dense full-map MSE. It must not be used as the paper-faithful conclusion and is not rerunnable through the current training entrypoint without intentionally disabling the sparse-loss guard.
  compare_against:
    - reports/irt4_zeroshot/c_baseline/secondU_test_metrics.json
    - reports/irt4_zeroshot/s_rand1_300/secondU_test_metrics.json
  metrics:
    - mse
    - nmse
    - rmse
  save_prediction_panels: true
  measure_runtime: true
